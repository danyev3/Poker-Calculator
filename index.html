<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Ledger Pro</title>
    <style>
        :root {
            --card-bg: rgba(15, 23, 42, 0.95);
            --accent-green: #10b981;
            --accent-gold: #fbbf24;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --danger: #ef4444;
            --input-bg: #1e293b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Sfondo stile tavolo da poker in panno verde */
            background: radial-gradient(circle at center, #2e6b45 0%, #0b2115 100%);
            color: var(--text-primary);
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 2vh;
        }

        /* Header & Localization */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        h1 {
            margin: 0;
            font-size: 22px;
            background: linear-gradient(to right, var(--accent-green), var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .controls-top {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        select {
            background: var(--input-bg);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 6px 8px;
            border-radius: 8px;
            cursor: pointer;
            outline: none;
            font-size: 14px;
        }

        /* Table */
        .row-header {
            display: grid;
            /* 3 colonne fisse sulla stessa riga + bottone X */
            grid-template-columns: 2fr 1.2fr 1.2fr 30px;
            gap: 8px;
            margin-bottom: 10px;
            padding: 0 5px;
            color: var(--text-secondary);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .player-row {
            display: grid;
            grid-template-columns: 2fr 1.2fr 1.2fr 30px;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
        }

        input {
            width: 100%;
            min-width: 0; /* Fondamentale per far rimpicciolire l'input su mobile */
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 8px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-gold);
            background: #2f3e52;
        }

        /* Buttons */
        .btn {
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:active { transform: scale(0.95); }

        .btn-add {
            width: 100%;
            padding: 12px;
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-green);
            border: 1px dashed var(--accent-green);
            margin: 15px 0 25px 0;
            font-size: 15px;
        }

        .btn-reset {
            background: transparent;
            color: var(--text-secondary);
            font-size: 11px;
            padding: 6px 10px;
            border: 1px solid #334155;
            text-transform: uppercase;
        }

        .btn-reset:hover { color: var(--danger); border-color: var(--danger); }

        .btn-remove {
            background: transparent;
            color: #64748b;
            font-size: 20px;
            padding: 0;
        }

        .btn-remove:hover { color: var(--danger); }

        /* Results */
        #results {
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border-left: 4px solid var(--accent-gold);
            display: none;
            font-size: 15px;
        }

        .transfer {
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .transfer:last-child { border-bottom: none; padding-bottom: 0; }
        .error { color: var(--danger); font-size: 14px; font-weight: bold; }
        
        /* Piccoli aggiustamenti per schermi molto stretti */
        @media (max-width: 400px) {
            .container { padding: 15px 10px; }
            input { padding: 8px 4px; font-size: 13px; }
            .row-header { font-size: 10px; gap: 4px; }
            .player-row { gap: 4px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 id="title">Poker Ledger</h1>
            <div class="controls-top">
                <select id="langSelect" onchange="changeLanguage(this.value)">
                    <option value="it">🇮🇹 IT</option>
                    <option value="en">🇺🇸 EN</option>
                    <option value="es">🇪🇸 ES</option>
                    <option value="fr">🇫🇷 FR</option>
                    <option value="de">🇩🇪 DE</option>
                </select>
                <button id="reset-btn" class="btn btn-reset" onclick="resetAll()">Reset</button>
            </div>
        </div>

        <div class="row-header">
            <span data-t="col_name">Nome</span>
            <span data-t="col_spent">Buy-in
